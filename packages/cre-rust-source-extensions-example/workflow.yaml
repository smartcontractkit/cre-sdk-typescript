# Example 1: source-extensions — both lib_alpha and lib_beta via --cre-exports
local-simulation:
  user-workflow:
    workflow-owner-address: "(optional)"
    workflow-name: "rust-inject-source-extensions"
  workflow-artifacts:
    workflow-path: "./wasm/workflow.wasm"
    config-path: "./config.json"

staging-settings:
  user-workflow:
    workflow-name: "rust-inject-source-extensions"
  workflow-artifacts:
    workflow-path: "./wasm/workflow.wasm"
    config-path: "./config.json"
    secrets-path: ""

production-settings:
  user-workflow:
    workflow-name: "rust-inject-source-extensions"
  workflow-artifacts:
    workflow-path: "./wasm/workflow.wasm"
    config-path: "./config.json"
    secrets-path: ""
