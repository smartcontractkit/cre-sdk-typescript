# Maintainer debug workflow: runs the same comment script as
# template-compatibility-comment.yml, but from workflow_dispatch so you can
# test from a feature branch (workflow file + script come from the branch you select).
#
# SECURITY: Anyone who can run this workflow can post/delete comments on the PR
# number you supply (same as the production comment job). Restrict repo/workflow
# permissions accordingly.
#
# Two modes:
#   1) Leave "source_run_id" empty — writes synthetic /tmp/compat-results from inputs.
#   2) Set "source_run_id" — downloads the template-compat-results artifact from that
#      run (same repository), same layout as Template Compatibility Check uploads.

name: Template Compatibility Comment (debug)

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'Required when source_run_id is empty. Ignored when downloading an artifact (pr-number.txt comes from the artifact).'
        required: false
        type: string
      source_run_id:
        description: 'Optional. Workflow run ID to download template-compat-results from. Leave empty to use synthetic inputs below.'
        required: false
        type: string
      exit_code:
        description: 'Synthetic only. 0 = success (delete stale comment); 1 = failure (post/update comment).'
        required: true
        type: choice
        default: '1'
        options:
          - '0'
          - '1'
      templates_ref:
        description: 'Synthetic only. Value for templates-ref.txt (e.g. main or compat/your-branch).'
        required: true
        type: string
        default: 'main'
      head_ref:
        description: 'Synthetic only. Value for head-ref.txt (SDK branch name in compat instructions).'
        required: true
        type: string
        default: 'workflow-debug'
      link_run_id:
        description: 'Optional. Actions run id for the "View full output" link. Defaults to this debug run.'
        required: false
        type: string

permissions:
  contents: read
  pull-requests: write
  actions: read

jobs:
  debug-comment:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Validate inputs
        run: |
          if [[ -z '${{ inputs.source_run_id }}' && -z '${{ inputs.pr_number }}' ]]; then
            echo '::error::pr_number is required when source_run_id is empty (synthetic mode).'
            exit 1
          fi

      - name: Download compat results artifact
        if: ${{ inputs.source_run_id != '' }}
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: template-compat-results
          path: /tmp/compat-results
          run-id: ${{ inputs.source_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Write synthetic compat results
        if: ${{ inputs.source_run_id == '' }}
        run: |
          mkdir -p /tmp/compat-results
          printf '%s' '${{ inputs.pr_number }}' > /tmp/compat-results/pr-number.txt
          printf '%s' '${{ inputs.exit_code }}' > /tmp/compat-results/exit-code.txt
          printf '%s' '${{ inputs.templates_ref }}' > /tmp/compat-results/templates-ref.txt
          printf '%s' '${{ inputs.head_ref }}' > /tmp/compat-results/head-ref.txt
          python3 << 'PY'
          import pathlib

          exit_code = "${{ inputs.exit_code }}"
          out_pass = (
              "Building SDK...\n"
              "✅ SDK built.\n\n"
              "Found 2 TypeScript templates to test.\n\n"
              "  ✅ [1/2] example-a/workflow\n"
              "  ✅ [2/2] example-b/workflow\n\n"
              "========================================================\n"
              "Results: 2 passed, 0 failed\n"
              "========================================================\n\n"
              "All templates passed!\n"
          )
          out_fail = (
              "Building SDK...\n"
              "✅ SDK built.\n\n"
              "Found 2 TypeScript templates to test.\n\n"
              "  ❌ [1/2] example-a/workflow\n"
              "  ✅ [2/2] example-b/workflow\n\n"
              "========================================================\n"
              "Results: 1 passed, 1 failed\n"
              "========================================================\n\n"
              "Failed templates:\n"
              "  ❌ example-a/workflow\n\n"
              "========================================================\n"
              "Failure Details\n"
              "========================================================\n\n"
              "❌ example-a/workflow — typecheck\n"
              "--------\n"
              "error: synthetic debug failure (template-compatibility-comment-debug.yml)\n"
          )
          pathlib.Path("/tmp/compat-results/output.txt").write_text(
              out_pass if exit_code == "0" else out_fail
          )
          PY

      - name: Post or remove PR comment (debug)
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        env:
          LINK_RUN_ID: ${{ inputs.link_run_id }}
        with:
          script: |
            const path = require('path');
            const run = require(path.join(process.env.GITHUB_WORKSPACE, 'scripts', 'template-compatibility-comment.js'));
            const linkRaw = (process.env.LINK_RUN_ID || '').trim();
            const linkParsed = parseInt(linkRaw, 10);
            const linkId = Number.isFinite(linkParsed) && linkParsed > 0 ? linkParsed : context.runId;
            const rawServer = process.env.GITHUB_SERVER_URL || 'https://github.com';
            const serverUrl = String(rawServer).replace(/\/$/, '');
            const ctx = {
              ...context,
              serverUrl: context.serverUrl || serverUrl,
              payload: { ...context.payload, workflow_run: { id: linkId } },
            };
            await run({ github, context: ctx });
