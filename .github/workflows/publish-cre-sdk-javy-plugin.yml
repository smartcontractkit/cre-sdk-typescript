name: Publish CRE SDK Javy Plugin

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to checkout and publish from (leave empty for latest commit on main)"
        required: false
        type: string
      dry_run:
        description: "Run in dry-run mode (do not actually publish)"
        required: false
        default: false
        type: boolean

env:
  BUN_VERSION: "1.2.21"

jobs:
  build-and-publish-cre-sdk-javy-plugin:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # for npm provenance
    environment: Publish

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.inputs.tag || 'main' }}
          fetch-depth: 0
          submodules: recursive

      - name: Display checkout info
        run: |
          echo "Checked out ref: ${{ github.event.inputs.tag || 'main' }}"
          echo "Current commit: $(git rev-parse HEAD)"
          echo "Current commit short: $(git rev-parse --short HEAD)"

      - name: Reject cd-line tags
        if: ${{ github.event.inputs.tag != '' }}
        run: |
          INPUT_TAG="${{ github.event.inputs.tag }}"
          if [[ "$INPUT_TAG" == *-cd* ]]; then
            echo "::error::Refusing to publish '$INPUT_TAG' through this workflow."
            echo "::error::cd-line tags must be published via cd-release.yml, not the main-line publish workflow."
            exit 1
          fi

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Setup Node.js for npm publish
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Update npm
        run: npm install -g npm@latest

      - name: Get package version
        working-directory: packages/cre-sdk-javy-plugin
        run: |
          # Get the version from package.json
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          echo "JAVY_PLUGIN_VERSION=$CURRENT_VERSION" >> $GITHUB_ENV
          echo "Using javy plugin version from package.json: $CURRENT_VERSION"

          # Detect pre-release tag from version (e.g. 1.2.0-alpha.1 → alpha)
          if [[ "$CURRENT_VERSION" =~ -([a-zA-Z]+) ]]; then
            NPM_TAG="${BASH_REMATCH[1]}"
          else
            NPM_TAG="latest"
          fi
          echo "NPM_DIST_TAG=$NPM_TAG" >> $GITHUB_ENV
          echo "npm dist-tag: $NPM_TAG"

      - name: Publish CRE SDK Javy plugin package
        working-directory: packages/cre-sdk-javy-plugin
        run: |
          echo "Publishing @chainlink/cre-sdk-javy-plugin with dist-tag: $NPM_DIST_TAG..."
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            echo "DRY RUN: Would publish @chainlink/cre-sdk-javy-plugin"
            npm publish --dry-run --access public --tag "$NPM_DIST_TAG" --verbose
          else
            npm publish --access public --tag "$NPM_DIST_TAG" --verbose
          fi

      - name: Create release summary
        if: ${{ !github.event.inputs.dry_run }}
        run: |
          echo "## 🔌 Published CRE SDK Javy Plugin Package" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- 🔌 \`@chainlink/cre-sdk-javy-plugin\`" >> $GITHUB_STEP_SUMMARY
          echo "- 📋 Published from: \`${{ github.event.inputs.tag || 'main' }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- 🔗 Commit: \`$(git rev-parse --short HEAD)\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Installation" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "# Using bun" >> $GITHUB_STEP_SUMMARY
          echo "bun add @chainlink/cre-sdk-javy-plugin" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### CLI Commands" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "# Setup CRE environment" >> $GITHUB_STEP_SUMMARY
          echo "bun x cre-setup" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "# Compile workflow" >> $GITHUB_STEP_SUMMARY
          echo "bun x cre-compile-workflow" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

  verify-cre-sdk-javy-plugin:
    needs: build-and-publish-cre-sdk-javy-plugin
    runs-on: ubuntu-latest
    if: ${{ !github.event.inputs.dry_run }}

    steps:
      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Wait for package propagation
        run: sleep 60

      - name: Verify CRE SDK Javy plugin package installation
        run: |
          echo "Verifying @chainlink/cre-sdk-javy-plugin can be installed..."
          bun add @chainlink/cre-sdk-javy-plugin --dry-run
          echo "✅ CRE SDK Javy plugin package verification successful"

      - name: Verify CLI binaries are available
        run: |
          echo "Installing package to test CLI binaries..."
          bun add @chainlink/cre-sdk-javy-plugin

          echo "Checking cre-setup command via bunx..."
          if bun x cre-setup --help >/dev/null 2>&1; then
            echo "✅ cre-setup command is available via bunx"
          else
            echo "❌ cre-setup command not found via bunx"
            exit 1
          fi

          echo "Checking cre-compile-workflow command via bunx..."
          if bun x cre-compile-workflow --help >/dev/null 2>&1; then
            echo "✅ cre-compile-workflow command is available via bunx"
          else
            echo "❌ cre-compile-workflow command not found via bunx"
            exit 1
          fi
